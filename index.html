<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4361EE">
  <title>トレーニング記録</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
</head>
<body>
  <header class="app-header">
    <h1>トレーニング記録</h1>
  </header>

  <main id="main-content">
    <!-- JS が画面を挿入 -->
  </main>

  <nav class="bottom-nav" aria-label="メインナビ">
    <button class="nav-btn active" data-screen="home" aria-current="page">
      <span class="nav-icon" aria-hidden="true">🏠</span>
      <span class="nav-label">ホーム</span>
    </button>
    <button class="nav-btn" data-screen="import" aria-current="false">
      <span class="nav-icon" aria-hidden="true">📥</span>
      <span class="nav-label">取り込み</span>
    </button>
    <button class="nav-btn" data-screen="history" aria-current="false">
      <span class="nav-icon" aria-hidden="true">📅</span>
      <span class="nav-label">履歴</span>
    </button>
    <button class="nav-btn" data-screen="videos" aria-current="false">
      <span class="nav-icon" aria-hidden="true">🎬</span>
      <span class="nav-label">動画</span>
    </button>
  </nav>

  <script src="./js/util.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/home.js"></script>
  <script src="./js/import.js"></script>
  <script src="./js/history.js"></script>
  <script src="./js/videos.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
